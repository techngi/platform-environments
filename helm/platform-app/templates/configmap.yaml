apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "platform-app.fullname" . }}-config
  labels:
    {{- include "platform-app.labels" . | nindent 4 }}
data:
  APP_VERSION: {{ .Values.appConfig.APP_VERSION | quote }}
  APP_ENV: {{ .Values.appConfig.APP_ENV | quote }}
  LOG_LEVEL: {{ .Values.appConfig.LOG_LEVEL | quote }}
