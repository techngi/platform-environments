apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-app-prod
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/techngi/platform-environments.git
    targetRevision: master
    path: helm/platform-app
    helm:
      valueFiles:
        - ../../envs/prod/values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
