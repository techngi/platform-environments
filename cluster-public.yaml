apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: devops-hybrid
  region: ap-southeast-2

vpc:
  nat:
    gateway: Disable

managedNodeGroups:
  - name: ng-dev
    instanceType: t3.small
    desiredCapacity: 1
    minSize: 0
    maxSize: 2
    volumeSize: 20
    ssh:
      allow: false
    privateNetworking: false

iam:
  withOIDC: true
